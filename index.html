<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Vura Canvas Editor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #080808;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #container {
            flex: 1;
            min-height: 0;
            width: 100%;
        }

        /* Force Monaco layout overrides for exact look matching */
        .monaco-editor,
        .monaco-editor .overflow-guard,
        .monaco-editor .monaco-scrollable-element {
            border-radius: 0 !important;
        }
        .monaco-editor .monaco-scrollable-element .scrollbar.horizontal {
            background: #080808 !important;
            border-top: 1px solid #111111;
        }
        .monaco-editor .monaco-scrollable-element .scrollbar.horizontal .slider {
            background: #161616 !important;
        }
        .monaco-editor .monaco-scrollable-element .scrollbar.horizontal .slider:hover {
            background: #242424 !important;
        }
        .monaco-editor {
            scrollbar-color: #161616 #080808;
            scrollbar-width: thin;
        }
    </style>
</head>
<body>

<div id="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
<script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' } });

    let editor = null;

    // Deep Dark Theme Specs
    const vuraTheme = {
        base: 'vs-dark',
        inherit: true,
        rules: [
            { token: 'keyword', foreground: 'e06c75' },
            { token: 'keyword.lua', foreground: 'e06c75' },
            { token: 'string', foreground: '98c379' },
            { token: 'comment', foreground: '5c6370', fontStyle: 'italic' },
            { token: 'number', foreground: 'd19a66' },
            { token: 'identifier', foreground: 'abb2bf' },
            { token: 'type', foreground: '56b6c2' },
        ],
        colors: {
            'editor.background': '#080808',
            'editor.foreground': '#cccccc',
            'editorCursor.foreground': '#aaaaaa',
            'editor.selectionBackground': '#242424',
            'editor.selectionHighlightBackground': '#161616',
            'editor.inactiveSelectionBackground': '#111111',
            'editor.lineHighlightBackground': '#0d0d0d',
            'editorLineNumber.foreground': '#222222',
            'editorLineNumber.activeForeground': '#555555',
            'scrollbarSlider.background': '#161616',
            'scrollbarSlider.hoverBackground': '#242424',
            'scrollbarSlider.activeBackground': '#2c2c2c',
            'editorSuggestWidget.background': '#0d0d0d',
            'editorSuggestWidget.border': '#161616',
            'editorSuggestWidget.selectedBackground': '#161616',
            'editorSuggestWidget.highlightForeground': '#ffffff',
        }
    };

    // --------------------------------------------------------------
    // INTEGRATED ENGINE AUTOCOMPLETE EXTENSION BLOCK
    // --------------------------------------------------------------
    function registerRobloxCompletions() {
        const CK = monaco.languages.CompletionItemKind;
        const IT = monaco.languages.CompletionItemInsertTextRule;

        const kw   = (l, d)        => ({ label:l, kind:CK.Keyword,   insertText:l,  detail:'keyword',  documentation:d });
        const fn   = (l, s, d, dc) => ({ label:l, kind:CK.Function,  insertText:s,  insertTextRules:IT.InsertAsSnippet, detail:d, documentation:dc });
        const prop = (l, d, dc)    => ({ label:l, kind:CK.Property,  insertText:l,  detail:d, documentation:dc });
        const svc  = (l, dc)       => ({ label:l, kind:CK.Module,    insertText:l,  detail:'Service', documentation:dc });
        const snip = (l, s, d, dc) => ({ label:l, kind:CK.Snippet,   insertText:s,  insertTextRules:IT.InsertAsSnippet, detail:d, documentation:dc });
        const enu  = (l, dc)       => ({ label:l, kind:CK.Enum,      insertText:l,  detail:'Enum', documentation:dc });

        const keywords = ['and','break','do','else','elseif','end','false','for','function',
            'if','in','local','nil','not','or','repeat','return','then','true','until','while']
            .map(l => kw(l));

        const globals = [
            prop('game','DataModel','Root DataModel.'), prop('workspace','Workspace','Alias for game:GetService("Workspace").'),
            prop('script','Script','The script object.'), prop('_G','table','Shared global table.'),
            prop('Enum','Enum','Root of all Enum types.'), prop('Instance','Instance','Base class for all objects.'),
            prop('Vector2','Vector2','2D vector.'), prop('Vector3','Vector3','3D vector.'),
            prop('CFrame','CFrame','Position and orientation.'), prop('Color3','Color3','RGB color 0-1.'),
            prop('UDim2','UDim2','2D UI size/position.'), prop('TweenInfo','TweenInfo','Tween config.'),
            prop('print','function','Print to output.'), prop('warn','function','Print warning.'),
            prop('error','function','Raise runtime error.'), prop('assert','function','Error if falsy.'),
            prop('pcall','function','Protected call.'), prop('xpcall','function','Protected call with handler.'),
            prop('tostring','function','Value to string.'), prop('tonumber','function','String to number.'),
            prop('type','function','Lua type as string.'), prop('typeof','function','Roblox type as string.'),
        ];

        const services = [
            svc('Players','All connected players.'), svc('Workspace','3D world container.'),
            svc('ReplicatedStorage','Server + client shared storage.'), svc('ServerStorage','Server-only storage.'),
            svc('TweenService','Create tweens.'), svc('UserInputService','Keyboard, mouse, touch, gamepad.'),
            svc('HttpService','HTTP + JSON.'),
        ];

        const instanceMethods = [
            fn('FindFirstChild','FindFirstChild("${1:name}", ${2:recursive})','Instance:FindFirstChild()','Find child by name.'),
            fn('WaitForChild','WaitForChild("${1:name}", ${2:timeout})','Instance:WaitForChild()','Yield until child exists.'),
            fn('GetChildren','GetChildren()','Instance:GetChildren()','Array of direct children.'),
            fn('Destroy','Destroy()','Instance:Destroy()','Remove from game.'),
        ];

        const getServiceFn = fn('GetService',
            'GetService("${1|Players,Workspace,ReplicatedStorage,ServerStorage,ServerScriptService,StarterGui,StarterPack,StarterPlayer,Lighting,SoundService,RunService,TweenService,UserInputService,ContextActionService,CollectionService,HttpService,DataStoreService|}")',
            'game:GetService()','Returns the service singleton.');

        const taskLib = [
            fn('task.wait','task.wait(${1:seconds})','task.wait()','Yield N seconds.'),
            fn('task.spawn','task.spawn(${1:func}, ${2:...})','task.spawn()','Run on next cycle.'),
            fn('task.delay','task.delay(${1:seconds}, ${2:func})','task.delay()','Call after N seconds.'),
        ];

        const snippets = [
            snip('for i',        'for ${1:i} = ${2:1}, ${3:10} do\n\t${4}\nend',             'Numeric for',     ''),
            snip('if',           'if ${1:condition} then\n\t${2}\nend',                      'if',              ''),
            snip('local',        'local ${1:name} = ${2:value}',                             'local variable',  ''),
            snip('connect',      '${1:signal}:Connect(function(${2:...})\n\t${3}\nend)',     'event:Connect()', ''),
        ];

        const allItems = [
            ...keywords, ...globals, ...services, ...instanceMethods,
            getServiceFn, ...taskLib, ...snippets
        ];

        monaco.languages.registerCompletionItemProvider('lua', {
            triggerCharacters: ['.', ':', '"', "'"],
            provideCompletionItems(model, position) {
                const word   = model.getWordUntilPosition(position);
                const range  = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber, startColumn: word.startColumn, endColumn: word.endColumn };
                const before = model.getLineContent(position.lineNumber).substring(0, position.column - 1);

                const strip = (items, pfx) => ({ suggestions: items.map(s => ({ ...s, insertText: pfx ? s.insertText.replace(new RegExp('^' + pfx.replace(/\./g,'\\.') + '\\.?'), '') : s.insertText, range })) });

                if (/\bgame\s*:$/.test(before))           return strip([getServiceFn]);
                if (/\btask\s*\.\s*$/.test(before))       return strip(taskLib, 'task');
                if (/:$/.test(before))                     return strip([...instanceMethods, getServiceFn]);

                return { suggestions: allItems.map(s => ({ ...s, range })) };
            }
        });
    }

    // Initialize Monaco instance Engine
    require(['vs/editor/editor.main'], function () {
        monaco.editor.defineTheme('vuraTheme', vuraTheme);
        
        editor = monaco.editor.create(document.getElementById('container'), {
            theme: 'vuraTheme',
            language: 'lua',
            fontSize: 13,
            fontFamily: "'JetBrains Mono', 'Consolas', monospace",
            lineHeight: 20,
            automaticLayout: true,
            cursorBlinking: 'solid',
            smoothScrolling: true,
            scrollBeyondLastLine: false,
            renderLineHighlight: 'line',
            minimap: { enabled: false },
            wordWrap: 'on',
            padding: { top: 10, bottom: 10 },
            scrollbar: { verticalScrollbarSize: 4, horizontalScrollbarSize: 4, useShadows: false },
            bracketPairColorization: { enabled: true },
        });

        registerRobloxCompletions();

        // Dispatch state context down to host runtime core
        editor.onDidChangeModelContent(() => {
            window.parent.postMessage({
                type: 'MONACO_VALUE_CHANGED',
                value: editor.getValue()
            }, '*');
        });
    });

    // Handle Inter-Process System execution queries
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'SET_MONACO_VALUE') {
            if (editor && editor.getValue() !== event.data.value) {
                editor.setValue(event.data.value);
            }
        }
    });
</script>
</body>
</html>

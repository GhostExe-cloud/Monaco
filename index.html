<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>ProVoid Lightning | Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

        :root {
            --bg:               #080808;
            --surface:          rgba(20, 20, 20, 0.72);
            --surface-light:    rgba(35, 35, 35, 0.48);
            --border:           rgba(255,255,255,0.09);
            --accent:           #4caf50;
            --accent-dim:       rgba(76,175,80,0.16);
            --accent-glow:      rgba(76,175,80,0.32);
            --text:             #e0e0e0;
            --text-dim:         #888888;
            --transition:       0.45s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all var(--transition); }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #birthday-banner {
            display: none;
            flex-shrink: 0;
            background: linear-gradient(90deg, #0a0a0a, #1a1600, #0a0a0a);
            border-bottom: 1px solid rgba(255,215,0,0.28);
            padding: 10px 25px;
            align-items: center;
            justify-content: space-between;
        }

        .bday-text { color: gold; font-size: 12px; font-weight: 600; text-shadow: 0 0 10px rgba(255,215,0,0.35); }
        .donate-btn {
            background: gold;
            color: #000;
            padding: 4px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
        }

        .donate-btn:hover { background: white; box-shadow: 0 0 18px rgba(255,215,0,0.55); }

        #tab-bar-outer {
            height: 44px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        #tab-bar {
            flex: 1 1 0;
            min-width: 0;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }

        #tab-bar::-webkit-scrollbar { display: none; }

        #tab-bar-outer::after {
            content: '';
            position: absolute;
            right: 38px; top: 0; bottom: 0;
            width: 28px;
            background: linear-gradient(to right, transparent, var(--bg));
            pointer-events: none;
            z-index: 1;
        }

        #new-tab-btn {
            flex-shrink: 0;
            width: 38px;
            height: 100%;
            border-left: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #444;
            font-size: 20px;
        }

        #new-tab-btn:hover { background: var(--surface-light); color: #777; }

        .tab {
            flex-shrink: 0;
            height: 30px;
            min-width: 120px;
            max-width: 180px;
            padding: 0 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 12px;
            color: #555;
            user-select: none;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .tab.active {
            background: color-mix(in srgb, var(--surface) 65%, var(--accent-dim) 35%);
            border-color: color-mix(in srgb, var(--accent) 70%, white 30%);
            color: #ddd;
            box-shadow: 0 3px 14px var(--accent-glow);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10px; right: 10px;
            height: 2px;
            border-radius: 1px;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .tab.dirty::before {
            content: '';
            position: absolute;
            top: 6px; left: 6px;
            width: 5px; height: 5px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--accent);
        }

        .tab:hover:not(.active) {
            background: color-mix(in srgb, var(--surface) 80%, white 20%);
            border-color: #333;
            color: #777;
        }

        .tab-lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }

        .tab-close {
            flex-shrink: 0;
            width: 14px;
            margin-left: 8px;
            font-size: 14px;
            opacity: 0;
        }

        .tab:hover .tab-close { opacity: 0.4; }
        .tab-close:hover      { color: #ff5555 !important; opacity: 1; }

        #container {
            flex: 1;
            min-height: 0;
            width: 100%;
            background: var(--surface-light);
            backdrop-filter: blur(20px);
            border-radius: 0 0 14px 14px;
            border: 1px solid var(--border);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            z-index: 9999;
        }

        .toast {
            padding: 10px 18px;
            background: rgba(13,13,13,0.94);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 8px;
            transform: translateX(160%);
            transition: transform 0.52s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 11px;
            min-width: 210px;
            color: #bbb;
            box-shadow: 0 6px 24px rgba(0,0,0,0.6);
        }

        .toast.show { transform: translateX(0); }

        .toast-tag { color: var(--accent); font-weight: 600; margin-right: 6px; }

        ::-webkit-scrollbar       { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        .tab-rename-input {
            background: #111;
            border: 1px solid #333;
            color: white;
            width: 100%;
            outline: none;
            font-family: inherit;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .theme-transition-layer {
            position: fixed;
            inset: 0;
            background: var(--bg);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.95s ease;
        }

        .theme-transition-layer.active {
            opacity: 0.16;
        }
    </style>
</head>
<body>

    <div id="birthday-banner">
        <span class="bday-text">HAPPY BIRTHDAY PROVOID DEVELOPER!</span>
        <a href="#" class="donate-btn">SEND A GIFT</a>
    </div>

    <div id="tab-bar-outer">
        <div id="tab-bar"></div>
        <div id="new-tab-btn" title="New tab (Ctrl+T)">+</div>
    </div>

    <div id="container"></div>
    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' } });

        let editor = null, activeTab = null, tabs = [];

        function SetTheme(accent) {
            document.documentElement.style.setProperty('--accent', accent);
            document.documentElement.style.setProperty('--accent-dim', 
                `rgba(${parseInt(accent.slice(1,3),16)},${parseInt(accent.slice(3,5),16)},${parseInt(accent.slice(5,7),16)},0.16)`);
            document.documentElement.style.setProperty('--accent-glow', 
                `rgba(${parseInt(accent.slice(1,3),16)},${parseInt(accent.slice(3,5),16)},${parseInt(accent.slice(5,7),16)},0.32)`);

            const bar = document.getElementById('tab-bar');
            bar.style.opacity = '0.35';
            setTimeout(() => { bar.style.opacity = '1'; }, 220);

            const layer = document.createElement('div');
            layer.className = 'theme-transition-layer';
            document.body.appendChild(layer);
            layer.classList.add('active');
            setTimeout(() => {
                layer.classList.remove('active');
                setTimeout(() => layer.remove(), 1100);
            }, 80);
        }

        // ────────────────────────────────────────────────

        //  here (the code was truncated in the original input)
        // ────────────────────────────────────────────────

    </script>
</body>
</html>

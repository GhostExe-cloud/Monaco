<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>ProVoid Lightning | Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');

        :root {
            --bg-color:       #080808;
            --text-color:     #f0f0f0;
            --accent-color:   #4CAF50;
            --accent-dim:     rgba(76,175,80,0.12);
            --accent-border:  rgba(76,175,80,0.35);
            --hover-color:    #1a1a1a;
            --border-color:   #222222;
            --secondary-bg:   #0d0d0d;
            --secondary-text: #808080;
            --transition:     0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --birthday-gold:  #ffd700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Birthday banner ─────────────────────────────────── */
        #birthday-banner {
            display: none;
            flex-shrink: 0;
            background: linear-gradient(90deg, #0a0a0a, #1a1600, #0a0a0a);
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding: 10px 25px;
            align-items: center;
            justify-content: space-between;
        }
        .bday-text { color: var(--birthday-gold); font-size: 12px; font-weight: 600; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .donate-btn {
            background: var(--birthday-gold); color: #000;
            padding: 4px 12px; border-radius: 4px;
            text-decoration: none; font-weight: 800; font-size: 10px;
            text-transform: uppercase; transition: 0.3s;
        }
        .donate-btn:hover { background: #fff; box-shadow: 0 0 15px rgba(255,215,0,0.5); }

        /* ── Tab bar — FIX #2: outer row so + button stays outside scroll ── */
        #tab-bar-outer {
            height: 44px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            background: #080808;
            border-bottom: 1px solid #111111;
            position: relative;
        }
        /* Scrollable strip — tabs live here */
        #tab-bar {
            flex: 1 1 0;
            min-width: 0;               /* lets flex child shrink below content size */
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 5px;
            overflow-x: auto;           /* scroll when tabs overflow */
            overflow-y: hidden;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }
        #tab-bar::-webkit-scrollbar { display: none; }
        /* Fade hint on right edge */
        #tab-bar-outer::after {
            content: '';
            position: absolute;
            right: 38px; top: 0; bottom: 0;
            width: 24px;
            background: linear-gradient(to right, transparent, #080808);
            pointer-events: none;
            z-index: 1;
        }
        /* + button — pinned right, outside scroll area */
        #new-tab-btn {
            flex-shrink: 0;
            width: 38px; height: 100%;
            border-left: 1px solid #111111;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: #2e2e2e;
            font-size: 18px; line-height: 1;
            user-select: none;
            transition: background var(--transition), color var(--transition);
        }
        #new-tab-btn:hover { background: #0d0d0d; color: #555555; }

        /* ── Tabs — flex-shrink:0 so they overflow instead of compress ── */
        .tab {
            flex-shrink: 0;
            height: 30px;
            min-width: 120px; max-width: 180px;
            padding: 0 10px;
            background: #0d0d0d;
            border: 1px solid #161616;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
            font-size: 12px; color: #3a3a3a;
            user-select: none;
            position: relative; overflow: hidden;
            transition: background var(--transition), border-color var(--transition), color var(--transition);
        }
        .tab.active { background: #131313; border-color: #242424; color: #cccccc; }
        /* Active accent underline — reacts to --accent-color on theme change */
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10px; right: 10px;
            height: 2px; border-radius: 1px;
            background: var(--accent-color);
            box-shadow: 0 0 5px var(--accent-color);
        }
        /* Unsaved dot */
        .tab.dirty::before {
            content: '';
            position: absolute;
            top: 6px; left: 6px;
            width: 5px; height: 5px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 3px var(--accent-color);
        }
        .tab:hover:not(.active) { background: #0f0f0f; border-color: #1c1c1c; color: #555555; }
        .tab-lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none; }
        .tab-close {
            flex-shrink: 0; width: 14px; margin-left: 7px;
            font-size: 13px; line-height: 1; text-align: center;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
        }
        .tab:hover .tab-close      { opacity: 0.35; }
        .tab-close:hover           { color: #ff5555 !important; opacity: 1 !important; }

        /* ── Editor ──────────────────────────────────────────────── */
        #container { flex: 1 1 0; min-height: 0; width: 100%; }

        /* ── Toasts ──────────────────────────────────────────────── */
        .toast-container {
            position: fixed; bottom: 20px; right: 20px;
            display: flex; flex-direction: column-reverse;
            gap: 6px; z-index: 9999;
        }
        .toast {
            padding: 10px 16px;
            background: #0d0d0d; border: 1px solid #1a1a1a;
            border-left: 2px solid var(--accent-color);
            border-radius: 6px;
            transform: translateX(160%);
            transition: transform var(--transition);
            font-size: 11px; min-width: 200px; color: #aaaaaa;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(0); }
        .toast-tag { color: var(--accent-color); font-weight: 600; margin-right: 6px; }

        /* ── Thin page scrollbars ────────────────────────────────── */
        ::-webkit-scrollbar       { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a2a2a; }

        /* ── Tab rename input ────────────────────────────────────── */
        .tab-rename-input {
            background: #111; border: 1px solid #333; color: #fff;
            width: 100%; outline: none;
            font-family: inherit; font-size: 12px;
            padding: 1px 2px; border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="birthday-banner">
        <span class="bday-text">HAPPY BIRTHDAY PROVOID DEVELOPER!</span>
        <a href="#" class="donate-btn">SEND A GIFT</a>
    </div>

    <!-- FIX #2: scrollable strip + pinned + button as siblings, not parent/child -->
    <div id="tab-bar-outer">
        <div id="tab-bar"></div>
        <div id="new-tab-btn" title="New tab (Ctrl+T)">+</div>
    </div>

    <div id="container"></div>
    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' } });

        let editor = null, activeTab = null, tabs = [];
        let _currentAccent = '#4CAF50';

        // ── Colour helpers ────────────────────────────────────────────
        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
            const n = parseInt(hex, 16);
            return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }
        // For CSS variables — rgba() is fine here
        function cssAlpha(hex, a) {
            const { r, g, b } = hexToRgb(hex);
            return `rgba(${r},${g},${b},${a})`;
        }
        // FIX #3: Monaco theme colors MUST be 8-digit hex (RRGGBBAA), NOT rgba()
        function monacoAlpha(hex, a) {
            const { r, g, b } = hexToRgb(hex);
            const aa = Math.round(a * 255).toString(16).padStart(2, '0');
            return r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'00') + aa;
        }
        function lightenHex(hex) {
            const { r, g, b } = hexToRgb(hex);
            const f = 0.38;
            return [r, g, b].map(v => Math.min(255, Math.round(v + (255 - v) * f)).toString(16).padStart(2,'0')).join('');
        }

        // ── Monaco theme builder ──────────────────────────────────────
        function buildTheme(accent) {
            const m = a => monacoAlpha(accent, a);
            return {
                base: 'vs-dark', inherit: true,
                rules: [
                    { token: 'keyword',     foreground: accent.replace('#',''), fontStyle: '' },
                    { token: 'keyword.lua', foreground: accent.replace('#','') },
                    { token: 'string',      foreground: 'c8a96e' },
                    { token: 'string.lua',  foreground: 'c8a96e' },
                    { token: 'comment',     foreground: '353535', fontStyle: 'italic' },
                    { token: 'number',      foreground: lightenHex(accent) },
                    { token: 'identifier',  foreground: 'd4d4d4' },
                    { token: 'type',        foreground: 'aaaaaa' },
                ],
                colors: {
                    'editor.background':                    '#080808',
                    'editor.foreground':                    '#cccccc',
                    'editorCursor.foreground':              accent,
                    'editorCursor.background':              '#080808',
                    // Selection — 8-digit hex only
                    'editor.selectionBackground':           '#' + m(0.22),
                    'editor.selectionHighlightBackground':  '#' + m(0.10),
                    'editor.inactiveSelectionBackground':   '#' + m(0.12),
                    'editor.wordHighlightBackground':       '#' + m(0.13),
                    'editor.wordHighlightStrongBackground': '#' + m(0.22),
                    'editor.lineHighlightBackground':       '#0f0f0f',
                    'editor.lineHighlightBorder':           '#141414',
                    'editor.findMatchBackground':           '#' + m(0.36),
                    'editor.findMatchHighlightBackground':  '#' + m(0.18),
                    'editor.findRangeHighlightBackground':  '#' + m(0.10),
                    'editorLineNumber.foreground':          '#282828',
                    'editorLineNumber.activeForeground':    '#4a4a4a',
                    'editorGutter.background':              '#080808',
                    // Scrollbar — 8-digit hex, this fixes the "stays red" bug
                    'scrollbarSlider.background':           '#' + m(0.08),
                    'scrollbarSlider.hoverBackground':      '#' + m(0.18),
                    'scrollbarSlider.activeBackground':     '#' + m(0.32),
                    'scrollbar.shadow':                     '#00000000',
                    'editorOverviewRuler.background':       '#080808',
                    'editorOverviewRuler.border':           '#00000000',
                    'minimap.background':                   '#080808',
                    'minimap.selectionHighlight':           '#' + m(0.40),
                    'editorBracketMatch.background':        '#' + m(0.20),
                    'editorBracketMatch.border':            '#' + m(0.55),
                    'editorIndentGuide.background':         '#161616',
                    'editorIndentGuide.activeBackground':   '#242424',
                    'editorSuggestWidget.background':             '#0d0d0d',
                    'editorSuggestWidget.border':                 '#1e1e1e',
                    'editorSuggestWidget.foreground':             '#888888',
                    'editorSuggestWidget.selectedBackground':     '#' + m(0.18),
                    'editorSuggestWidget.highlightForeground':    accent,
                    'editorHoverWidget.background':         '#0d0d0d',
                    'editorHoverWidget.border':             '#1e1e1e',
                    'focusBorder':                          '#' + m(0.50),
                    'widget.shadow':                        '#00000066',
                }
            };
        }

        // ── BRIDGE: SetTheme (called from C#) ─────────────────────────
        window.SetTheme = function(accentHex) {
            _currentAccent = accentHex;
            const root = document.documentElement;
            root.style.setProperty('--accent-color',  accentHex);
            root.style.setProperty('--accent-dim',    cssAlpha(accentHex, 0.12));
            root.style.setProperty('--accent-border', cssAlpha(accentHex, 0.35));
            if (typeof monaco !== 'undefined' && editor) {
                monaco.editor.defineTheme('provoidUltra', buildTheme(accentHex));
                monaco.editor.setTheme('provoidUltra');
            }
        };

        // ── BRIDGE: SetText / GetText (called from C#) ────────────────
        window.SetText = function(content) {
            if (!editor) return;
            if (activeTab) { editor.setValue(content); }
            else           { createTab('Imported', content, true); }
        };
        window.GetText = function() { return editor ? editor.getValue() : ''; };

        // ── Birthday ──────────────────────────────────────────────────
        function celebrate() {
            const { r, g, b } = hexToRgb(_currentAccent);
            const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 },
                       colors: [hex, '#ffffff', '#ffd700'] });
        }
        function checkBirthday() {
            const d = new Date();
            if (d.getMonth() === 0 && (d.getDate() === 18 || d.getDate() === 19)) {
                document.getElementById('birthday-banner').style.display = 'flex';
                setTimeout(celebrate, 1500);
            }
        }

        // ── Toast ─────────────────────────────────────────────────────
        function notify(msg, tag = 'INFO') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<span class="toast-tag">${tag}</span>${msg}`;
            c.appendChild(t);
            setTimeout(() => t.classList.add('show'), 50);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3500);
        }

        // ── Tab management ────────────────────────────────────────────
        function createTab(name = null, content = '-- ProVoid Script', isNew = true) {
            if (!name) {
                let i = 1;
                const names = tabs.map(t => t.name);
                while (names.includes(`Script ${i}`)) i++;
                name = `Script ${i}`;
            }
            const tab = { id: Math.random().toString(36).substr(2,9), name, content, element: document.createElement('div') };
            tab.element.className = 'tab';
            tab.element.innerHTML = `<span class="tab-lbl">${tab.name}</span><span class="tab-close" title="Close (Ctrl+W)">x</span>`;

            tab.element.addEventListener('click', () => activateTab(tab));

            tab.element.addEventListener('dblclick', e => {
                e.stopPropagation();
                const lbl   = tab.element.querySelector('.tab-lbl');
                const input = document.createElement('input');
                input.className = 'tab-rename-input';
                input.value = tab.name;
                lbl.replaceWith(input);
                input.focus(); input.select();
                const done = () => {
                    tab.name = input.value.trim() || tab.name;
                    const newLbl = document.createElement('span');
                    newLbl.className = 'tab-lbl'; newLbl.textContent = tab.name;
                    input.replaceWith(newLbl);
                    saveTabs();
                };
                input.addEventListener('blur', done);
                input.addEventListener('keydown', k => { if (k.key === 'Enter') done(); k.stopPropagation(); });
            });

            tab.element.querySelector('.tab-close').addEventListener('click', ev => {
                ev.stopPropagation(); closeTab(tab.id);
            });

            // FIX #2: append to #tab-bar directly (no insertBefore a sibling)
            document.getElementById('tab-bar').appendChild(tab.element);
            tabs.push(tab);
            if (isNew) activateTab(tab);
            return tab;
        }

        function activateTab(tab) {
            if (activeTab && activeTab.id !== tab.id) {
                // FIX #1: guard editor — it may be null during pre-Monaco restore
                if (editor) activeTab.content = editor.getValue();
                activeTab.element.classList.remove('active');
            }
            activeTab = tab;
            tab.element.classList.add('active');
            tab.element.classList.remove('dirty');
            // FIX #1: editor may not exist yet — Monaco init will call activateTab again
            if (editor) editor.setValue(tab.content);
            tab.element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
            saveTabs();
        }

        function closeTab(id) {
            if (tabs.length <= 1) return notify('Cannot close last tab', 'SYSTEM');
            const idx = tabs.findIndex(t => t.id === id);
            if (idx === -1) return;
            tabs[idx].element.remove();
            tabs.splice(idx, 1);
            if (activeTab?.id === id) activateTab(tabs[Math.max(0, idx - 1)]);
            saveTabs();
        }

        function saveTabs() {
            if (!activeTab || !editor) return;
            try {
                localStorage.setItem('provoid_tabs_v3', JSON.stringify({
                    activeTabId: activeTab.id,
                    tabs: tabs.map(t => ({
                        id: t.id, name: t.name,
                        content: t.id === activeTab.id ? editor.getValue() : t.content
                    }))
                }));
            } catch { /* storage full */ }
        }

        // ── Monaco init ───────────────────────────────────────────────
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('provoidUltra', buildTheme(_currentAccent));

            editor = monaco.editor.create(document.getElementById('container'), {
                theme:                      'provoidUltra',
                language:                   'lua',
                fontSize:                   14,
                fontFamily:                 "'JetBrains Mono', 'Consolas', monospace",
                lineHeight:                 22,
                automaticLayout:            true,
                cursorBlinking:             'expand',
                cursorSmoothCaretAnimation: true,
                smoothScrolling:            true,
                scrollBeyondLastLine:       false,
                renderLineHighlight:        'line',
                minimap:                    { enabled: false },
                padding:                    { top: 12, bottom: 12 },
                scrollbar: { verticalScrollbarSize: 4, horizontalScrollbarSize: 4, useShadows: false },
                overviewRulerBorder:        false,
                overviewRulerLanes:         0,
                hideCursorInOverviewRuler:  true,
                glyphMargin:                false,
                folding:                    true,
                renderWhitespace:           'none',
                tabSize:                    4,
                insertSpaces:               true,
                wordWrap:                   'off',
                suggest:                    { showKeywords: true, showSnippets: true },
            });

            registerRobloxCompletions();

            // FIX #1: restore tabs BEFORE wiring dirty listener
            // so restoring doesn't mark every tab as unsaved
            const saved = localStorage.getItem('provoid_tabs_v3');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    data.tabs.forEach(t => createTab(t.name, t.content, false));
                    // editor exists now — activateTab safely calls editor.setValue
                    activateTab(tabs.find(t => t.id === data.activeTabId) || tabs[0]);
                } catch (e) {
                    createTab(null, '-- ProVoid Lightning v4', true);
                }
            } else {
                createTab(null, '-- ProVoid Lightning v4', true);
            }

            // Wire AFTER restore so restore doesn't pollute dirty state
            editor.onDidChangeModelContent(() => {
                if (activeTab) activeTab.element.classList.add('dirty');
                saveTabs();
            });

            // Mouse-wheel scrolls tab bar horizontally
            document.getElementById('tab-bar').addEventListener('wheel', e => {
                if (e.deltaY !== 0) { e.preventDefault(); e.currentTarget.scrollLeft += e.deltaY; }
            }, { passive: false });

            checkBirthday();
        });

        // ── Keyboard shortcuts ────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 't') { e.preventDefault(); createTab(); }
            if (e.ctrlKey && e.key === 'w') { e.preventDefault(); if (activeTab) closeTab(activeTab.id); }
        });
        document.getElementById('new-tab-btn').addEventListener('click', () => createTab());

        // ═══════════════════════════════════════════════════════════════
        //  ROBLOX LUA AUTOCOMPLETE
        // ═══════════════════════════════════════════════════════════════
        function registerRobloxCompletions() {
            const CK = monaco.languages.CompletionItemKind;
            const IT = monaco.languages.CompletionItemInsertTextRule;

            const kw   = (l, d)        => ({ label:l, kind:CK.Keyword,   insertText:l,  detail:'keyword',  documentation:d });
            const fn   = (l, s, d, dc) => ({ label:l, kind:CK.Function,  insertText:s,  insertTextRules:IT.InsertAsSnippet, detail:d, documentation:dc });
            const prop = (l, d, dc)    => ({ label:l, kind:CK.Property,  insertText:l,  detail:d, documentation:dc });
            const svc  = (l, dc)       => ({ label:l, kind:CK.Module,    insertText:l,  detail:'Service', documentation:dc });
            const snip = (l, s, d, dc) => ({ label:l, kind:CK.Snippet,   insertText:s,  insertTextRules:IT.InsertAsSnippet, detail:d, documentation:dc });
            const enu  = (l, dc)       => ({ label:l, kind:CK.Enum,      insertText:l,  detail:'Enum', documentation:dc });

            const keywords = ['and','break','do','else','elseif','end','false','for','function',
                'if','in','local','nil','not','or','repeat','return','then','true','until','while']
                .map(l => kw(l));

            const globals = [
                prop('game','DataModel','Root DataModel.'), prop('workspace','Workspace','Alias for game:GetService("Workspace").'),
                prop('script','Script','The script object.'), prop('_G','table','Shared global table.'),
                prop('Enum','Enum','Root of all Enum types.'), prop('Instance','Instance','Base class for all objects.'),
                prop('Vector2','Vector2','2D vector.'), prop('Vector3','Vector3','3D vector.'),
                prop('CFrame','CFrame','Position and orientation.'), prop('Color3','Color3','RGB color 0-1.'),
                prop('UDim2','UDim2','2D UI size/position.'), prop('TweenInfo','TweenInfo','Tween config.'),
                prop('RaycastParams','RaycastParams','Raycast filter params.'),
                prop('print','function','Print to output.'), prop('warn','function','Print warning.'),
                prop('error','function','Raise runtime error.'), prop('assert','function','Error if falsy.'),
                prop('pcall','function','Protected call.'), prop('xpcall','function','Protected call with handler.'),
                prop('tostring','function','Value to string.'), prop('tonumber','function','String to number.'),
                prop('type','function','Lua type as string.'), prop('typeof','function','Roblox type as string.'),
                prop('ipairs','function','Array iteration.'), prop('pairs','function','Key-value iteration.'),
                prop('select','function','Vararg element selection.'), prop('unpack','function','Unpack table.'),
                prop('rawget','function','Get bypassing __index.'), prop('rawset','function','Set bypassing __newindex.'),
                prop('setmetatable','function','Set metatable.'), prop('getmetatable','function','Get metatable.'),
                prop('require','function','Load ModuleScript.'),
                prop('tick','function','Unix timestamp (prefer os.time).'), prop('time','function','Seconds since game start.'),
                prop('wait','function','Yield (prefer task.wait).'), prop('spawn','function','Schedule (prefer task.spawn).'),
            ];

            const services = [
                svc('Players','All connected players.'), svc('Workspace','3D world container.'),
                svc('ReplicatedStorage','Server + client shared storage.'), svc('ServerStorage','Server-only storage.'),
                svc('ServerScriptService','Server scripts container.'), svc('StarterGui','UI templates.'),
                svc('StarterPack','Tools cloned to backpack.'), svc('StarterPlayer','Character + player scripts.'),
                svc('Lighting','Environment lighting.'), svc('SoundService','Global sound settings.'),
                svc('RunService','Heartbeat / Stepped / RenderStepped.'), svc('TweenService','Create tweens.'),
                svc('UserInputService','Keyboard, mouse, touch, gamepad.'), svc('ContextActionService','Platform-agnostic input bindings.'),
                svc('CollectionService','Tag-based grouping.'), svc('HttpService','HTTP + JSON.'),
                svc('DataStoreService','Persistent cloud storage.'), svc('MessagingService','Cross-server pub/sub.'),
                svc('MarketplaceService','Products and passes.'), svc('PhysicsService','Collision groups.'),
                svc('PathfindingService','Navigation paths.'), svc('TextService','Text filtering.'),
                svc('Teams','Team objects.'), svc('VoiceChatService','Spatial voice chat.'),
            ];

            const instanceMethods = [

            monaco.languages.registerCompletionItemProvider('lua', {
                triggerCharacters: ['.', ':', '"', "'"],
                provideCompletionItems(model, position) {
                    const word   = model.getWordUntilPosition(position);
                    const range  = { startLineNumber: position.lineNumber, endLineNumber: position.lineNumber, startColumn: word.startColumn, endColumn: word.endColumn };
                    const before = model.getLineContent(position.lineNumber).substring(0, position.column - 1);

                    const strip = (items, pfx) => ({ suggestions: items.map(s => ({ ...s, insertText: pfx ? s.insertText.replace(new RegExp('^' + pfx.replace(/\./g,'\\.') + '\\.?'), '') : s.insertText, range })) });

                    if (/\bgame\s*:$/.test(before))           return strip([getServiceFn]);
                    if (/\btask\s*\.\s*$/.test(before))       return strip(taskLib, 'task');
                    if (/\bstring\s*\.\s*$/.test(before))     return strip(stringLib, 'string');
                    if (/\btable\s*\.\s*$/.test(before))      return strip(tableLib, 'table');
                    if (/\bmath\s*\.\s*$/.test(before))       return strip(mathLib, 'math');
                    if (/\bos\s*\.\s*$/.test(before))         return strip(osLib, 'os');
                    if (/\bcoroutine\s*\.\s*$/.test(before))  return strip(coroutineLib, 'coroutine');
                    if (/\bVector3\s*\.\s*$/.test(before))    return strip(vector3Api, 'Vector3');
                    if (/\bCFrame\s*\.\s*$/.test(before))     return strip(cframeApi, 'CFrame');
                    if (/\bColor3\s*\.\s*$/.test(before))     return strip(color3Api, 'Color3');
                    if (/\bEnum\s*\.\s*$/.test(before))       return strip(commonEnums.map(s => ({...s, insertText: s.label.replace('Enum.','')})));
                    if (/:$/.test(before))                     return strip([...instanceMethods, ...humanoidApi.filter(s=>s.kind===CK.Function), ...workspaceApi, getServiceFn]);

                    return { suggestions: allItems.map(s => ({ ...s, range })) };
                }
            });

            monaco.languages.registerHoverProvider('lua', {
                provideHover(model, position) {
                    const word = model.getWordAtPosition(position);
                    if (!word) return null;
                    const match = allItems.find(i => i.label === word.word || i.label === word.word + '(' || i.label.startsWith(word.word + '.'));
                    if (!match) return null;
                    return { contents: [{ value: `**${match.label}**  \`${match.detail || ''}\`` }, { value: match.documentation || '' }] };
                }
